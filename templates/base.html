{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zil Travelers{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'home/css/base.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="#" class="logo">Zil Travelers</a>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#destinations">Destinations</a>
                <a href="#packages">Packages</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </div>
            <div class="search-container">
                <form action="#" method="GET" class="search-form">
                    <input type="text" placeholder="Search destinations..." class="search-input">
                    <button type="submit" class="search-button">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Zil Travelers. All rights reserved.</p>
        </div>
    </footer>
    <script src="{% static 'home/js/base.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
